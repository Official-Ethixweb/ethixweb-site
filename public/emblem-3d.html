<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EthixWeb Logo — 3D</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        overflow: hidden;
        /* dark checkerboard = demo only, proves the canvas is transparent */
        background: transparent;
        font-family: system-ui, sans-serif;
      }
      #app {
        position: fixed;
        inset: 0;
      }
      canvas {
        display: block;
      }
      .ui {
        position: fixed;
        bottom: 16px;
        left: 50%;
        transform: translateX(-50%);
        display: none;
        gap: 10px;
        align-items: center;
        z-index: 10;
      }
      .hint {
        color: rgba(255, 255, 255, 0.5);
        font-size: 12px;
        letter-spacing: 0.04em;
        user-select: none;
      }
      button {
        appearance: none;
        border: 1px solid rgba(255, 255, 255, 0.35);
        background: rgba(255, 255, 255, 0.12);
        color: #eee;
        font-size: 12px;
        letter-spacing: 0.04em;
        padding: 7px 14px;
        border-radius: 8px;
        cursor: pointer;
        backdrop-filter: blur(6px);
      }
      button:hover {
        background: rgba(255, 255, 255, 0.22);
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <div class="ui">
      <span class="hint">drag to rotate 360° · scroll to zoom</span>
      <button id="savePng">Download PNG</button>
    </div>
